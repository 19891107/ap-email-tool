<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>AP Payment Email Generator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",sans-serif;background:#f0f4f8;min-height:100vh}
  input,textarea{font-family:"Segoe UI",sans-serif}
  kbd{background:#eee;padding:1px 5px;border-radius:3px;font-size:12px}
  a{color:#1F3864}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CLIENT_ID    = "5469cd12-9e8c-4344-8120-3c3f7b8bcdfe";
const TENANT_ID    = "d01ba920-936c-43d4-9122-56a0a8295ec7";
const REDIRECT_URI = window.location.href.split("?")[0].split("#")[0];
const SCOPES       = "openid profile Mail.ReadWrite";

const SAMPLE_DATA = [
  {vendor:"EuroFast",  invoice:"EFI2312",     amount:"26,396.00",    currency:"RON", comment:""},
  {vendor:"RootsEOR",  invoice:"807",          amount:"20,314.30",    currency:"USD", comment:""},
  {vendor:"People2.0", invoice:"CISE01004298", amount:"41,801.12",    currency:"SEK", comment:""},
  {vendor:"People2.0", invoice:"CISE01004295", amount:"488,092.20",   currency:"SEK", comment:""},
  {vendor:"People2.0", invoice:"CISE01004297", amount:"101,120.72",   currency:"SEK", comment:""},
  {vendor:"People2.0", invoice:"CISE01004296", amount:"147,277.39",   currency:"SEK", comment:""},
];

const CONTACTS_KEY = "ap_contacts_v5";
const SETTINGS_KEY = "ap_settings_v5";
function loadLS(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch{return d;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function groupByVendor(rows){
  return rows.reduce((a,r)=>{(a[r.vendor]=a[r.vendor]||[]).push(r);return a;},{});
}
function parseAmount(str){
  if(!str)return 0;
  return parseFloat(str.replace(/[, ]/g,"").replace(/[^\d.]/g,""))||0;
}
function formatAmount(num){
  return num.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function calcTotals(invoices){
  const t={};
  invoices.forEach(inv=>{
    const c=inv.currency||"";
    t[c]=(t[c]||0)+parseAmount(inv.amount);
  });
  return t;
}
function parseCSV(text){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2)return[];
  const raw=lines[0].split("\t").map(h=>h.trim().replace(/\r/g,""));
  const h=raw.map(x=>x.toLowerCase());
  const fc=(...kws)=>{for(const k of kws){const i=h.findIndex(x=>x.includes(k));if(i>=0)return i;}return -1;};
  const iV=fc("vendor"), iI=fc("invoice no","invoice#","invoice"),
        iA=fc("invoice amount"), iC=fc("currency","curr"), iCo=fc("comment","remark","note");
  return lines.slice(1).map(line=>{
    const c=line.split("\t").map(x=>x.trim().replace(/\r/g,""));
    const g=i=>i>=0?(c[i]||""):"";
    return{vendor:g(iV),invoice:g(iI),amount:g(iA),currency:g(iC),comment:g(iCo)};
  }).filter(r=>r.vendor);
}

// PKCE
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");}
async function generatePKCE(){
  const v=b64url(crypto.getRandomValues(new Uint8Array(32)));
  const d=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v));
  return{verifier:v,challenge:b64url(d)};
}
function buildAuthURL(ch,st){
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:"code",redirect_uri:REDIRECT_URI,
    scope:SCOPES,code_challenge:ch,code_challenge_method:"S256",response_mode:"fragment",state:st});
  return`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${p}`;
}
async function exchangeCode(code,verifier){
  const r=await fetch(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`,{
    method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams({client_id:CLIENT_ID,grant_type:"authorization_code",
      code,redirect_uri:REDIRECT_URI,code_verifier:verifier}),
  });
  return r.json();
}

// ── Email HTML builder
function buildHTML(vendor, invoices, groups, senderName, senderCompany, date){
  const hasNotes  = invoices.some(inv=>inv.comment&&inv.comment.trim()!=="");
  const hasTrace  = groups.some(g=>g.traceLink&&g.traceLink.trim()!=="");
  const hasGroupNote = groups.some(g=>g.note&&g.note.trim()!=="");

  // Styles
  const base="font-family:Arial,sans-serif;font-size:11pt;";
  const pSt=`style="${base}color:#222;margin:0 0 14pt 0;"`;
  const tblSt=`style="border-collapse:collapse;width:100%;min-width:500px;"`;

  // TH styles
  const thC=`style="${base}background:#1F3864;color:#fff;padding:9px 14px;border:1px solid #1F3864;text-align:center;white-space:nowrap;"`;
  const thR=`style="${base}background:#1F3864;color:#fff;padding:9px 14px;border:1px solid #1F3864;text-align:right;white-space:nowrap;"`;
  const thL=`style="${base}background:#1F3864;color:#fff;padding:9px 14px;border:1px solid #1F3864;text-align:left;white-space:nowrap;"`;

  // TD style factories
  const tdC=bg=>`style="${base}padding:8px 14px;border:1px solid #d0d0d0;background:${bg};text-align:center;"`;
  const tdR=bg=>`style="${base}padding:8px 14px;border:1px solid #d0d0d0;background:${bg};text-align:right;"`;
  const tdL=bg=>`style="${base}padding:8px 14px;border:1px solid #d0d0d0;background:${bg};text-align:left;"`;
  const tdBold=(bg,extra="")=>`style="${base}padding:8px 14px;border:1px solid #d0d0d0;background:${bg};font-weight:700;${extra}"`;

  // Build data rows, grouped
  let rows="";
  groups.forEach((g,gi)=>{
    const bg=gi%2===0?"#ffffff":"#f0f4fa";
    const gInv=(g.invoiceIndices||[]).map(i=>invoices[i]).filter(Boolean);
    const traceText=g.traceLink?`<a href="${g.traceLink}" style="color:#1F3864;text-decoration:underline;">View Trace</a>`:"";
    const noteText=g.note||"";

    gInv.forEach((inv,ii)=>{
      const noteCell  = hasNotes     ? `<td ${tdL(bg)}>${inv.comment||""}</td>` : "";
      const traceCell = hasTrace     ? (ii===0?`<td ${tdC(bg)} rowspan="${gInv.length}">${traceText}</td>`:"") : "";
      const gnoteCell = hasGroupNote ? (ii===0?`<td ${tdL(bg)} rowspan="${gInv.length}">${noteText}</td>`:"") : "";
      rows+=`<tr>
        <td ${tdL(bg)}>${inv.invoice}</td>
        <td ${tdR(bg)}>${inv.amount}</td>
        <td ${tdC(bg)}>${inv.currency}</td>
        ${noteCell}${gnoteCell}${traceCell}
      </tr>\n`;
    });
  });

  // Total rows
  const totals=calcTotals(invoices);
  const currencies=Object.keys(totals);
  const extraCols=(hasNotes?1:0)+(hasGroupNote?1:0)+(hasTrace?1:0);
  const totalRows=currencies.map((cur,i)=>{
    const label=i===0
      ?`<td ${tdBold("#e8edf8","text-align:left;vertical-align:middle;")} rowspan="${currencies.length}">Total</td>`:"";
    const extras=extraCols>0?`<td style="border:1px solid #d0d0d0;background:#e8edf8;" colspan="${extraCols}"></td>`:"";
    return`<tr>
      ${label}
      <td ${tdBold("#e8edf8","text-align:right;")}>${formatAmount(totals[cur])}</td>
      <td ${tdBold("#e8edf8","text-align:center;")}>${cur}</td>
      ${extras}
    </tr>`;
  }).join("\n");

  // Header row
  const noteTh   = hasNotes     ? `<th ${thL}>Comments</th>` : "";
  const gnTh     = hasGroupNote ? `<th ${thL}>Notes</th>`    : "";
  const traceTh  = hasTrace     ? `<th ${thC}>Payment Trace</th>` : "";
  const totalCols=3+(hasNotes?1:0)+(hasGroupNote?1:0)+(hasTrace?1:0);

  return`<div style="${base}color:#222;line-height:1.6;max-width:760px;">
<p ${pSt}>Dear ${vendor} Team,</p>
<p ${pSt}>We are pleased to inform you that the following payment(s) have been successfully processed on <strong>${date}</strong>. Please find the details below:</p>
<table ${tblSt}>
  <thead>
    <tr>
      <th ${thL}>Invoice No.</th>
      <th ${thR}>Invoice Amount</th>
      <th ${thC}>Currency</th>
      ${noteTh}${gnTh}${traceTh}
    </tr>
  </thead>
  <tbody>
    ${rows}
    <tr><td colspan="${totalCols}" style="border:none;padding:2px;"></td></tr>
    ${totalRows}
  </tbody>
</table>
<p style="margin:0 0 14pt 0;"> </p>
<p ${pSt}>Could you please confirm receipt of the above payment(s)? Should you have any questions or notice any discrepancies, please do not hesitate to contact us.</p>
<p ${pSt}>Best regards,<br/><strong>${senderName}</strong><br/>${senderCompany}</p>
</div>`;
}

// ── TagInput
function TagInput({value=[],onChange,placeholder}){
  const[input,setInput]=useState("");
  const add=v=>{const items=v.split(/[,;\s]+/).map(e=>e.trim()).filter(Boolean);onChange([...new Set([...value,...items])]);setInput("");};
  const onKey=e=>{
    if(["Enter",",",";","Tab"].includes(e.key)){e.preventDefault();if(input.trim())add(input);}
    else if(e.key==="Backspace"&&!input&&value.length)onChange(value.slice(0,-1));
  };
  return(
    <div onClick={e=>e.currentTarget.querySelector("input").focus()}
      style={{display:"flex",flexWrap:"wrap",gap:4,border:"1px solid #ddd",borderRadius:6,padding:"5px 8px",background:"#fff",minHeight:36,cursor:"text"}}>
      {value.map((t,i)=>(
        <span key={i} style={{background:"#e8edf8",color:"#1F3864",borderRadius:4,padding:"2px 8px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
          {t}<span onClick={()=>onChange(value.filter((_,j)=>j!==i))} style={{cursor:"pointer",fontWeight:700,opacity:0.6}}>×</span>
        </span>
      ))}
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
        onBlur={()=>{if(input.trim())add(input);}}
        placeholder={value.length===0?placeholder:""}
        style={{border:"none",outline:"none",fontSize:13,flex:1,minWidth:100,padding:"2px 0"}}/>
    </div>
  );
}

// ── App
function App(){
  const[rows,setRows]         =useState(SAMPLE_DATA);
  const[contacts,setContacts] =useState(()=>loadLS(CONTACTS_KEY,{}));
  const[settings,setSettings] =useState(()=>loadLS(SETTINGS_KEY,{senderName:"AP Team",senderCompany:"Your Company"}));
  const[paymentDate,setDate]  =useState(()=>new Date().toISOString().split("T")[0]);
  const[groups,setGroupsMap]  =useState({});
  const[drafts,setDrafts]     =useState({});
  const[activeTab,setTab]     =useState("data");
  const[activeDraft,setAD]    =useState(null);
  const[editingBody,setEB]    =useState({});
  const[pasteText,setPaste]   =useState("");
  const[token,setToken]       =useState(null);
  const[userEmail,setEmail]   =useState(null);
  const[authStatus,setAS]     =useState("idle");
  const[pushStatus,setPS]     =useState({});
  const[pushAll,setPushAll]   =useState("idle");
  const[parseLog,setLog]      =useState("");

  const grouped=groupByVendor(rows);
  const vendors=Object.keys(grouped);

  useEffect(()=>{saveLS(CONTACTS_KEY,contacts);},[contacts]);
  useEffect(()=>{saveLS(SETTINGS_KEY,settings);},[settings]);

  useEffect(()=>{
    setContacts(c=>{const n={...c};vendors.forEach(v=>{if(!n[v])n[v]={to:[],cc:[]};});return n;});
    setGroupsMap(gm=>{
      const n={...gm};
      vendors.forEach(v=>{
        if(!n[v])n[v]=[{invoiceIndices:grouped[v].map((_,i)=>i),traceLink:"",note:""}];
      });
      return n;
    });
  },[rows]);

  useEffect(()=>{
    const hash=window.location.hash;
    if(!hash.includes("code="))return;
    const params=new URLSearchParams(hash.replace("#",""));
    const code=params.get("code"),verifier=sessionStorage.getItem("pkce_verifier");
    if(!code||!verifier)return;
    setAS("pending");
    exchangeCode(code,verifier).then(async data=>{
      if(data.access_token){
        setToken(data.access_token);setAS("done");
        const me=await fetch("https://graph.microsoft.com/v1.0/me",{headers:{Authorization:`Bearer ${data.access_token}`}}).then(r=>r.json());
        setEmail(me.userPrincipalName||me.mail||"");
        window.history.replaceState(null,"",window.location.pathname);
      }else setAS("error");
    }).catch(()=>setAS("error"));
  },[]);

  const handleLogin=async()=>{
    const{verifier,challenge}=await generatePKCE();
    sessionStorage.setItem("pkce_verifier",verifier);
    window.location.href=buildAuthURL(challenge,Math.random().toString(36).slice(2));
  };

  const getG=v=>groups[v]||[{invoiceIndices:(grouped[v]||[]).map((_,i)=>i),traceLink:"",note:""}];
  const setG=(v,gs)=>setGroupsMap(m=>({...m,[v]:gs}));
  const updG=(v,gi,f,val)=>{const gs=[...getG(v)];gs[gi]={...gs[gi],[f]:val};setG(v,gs);};
  const togInv=(v,gi,idx)=>{
    const gs=getG(v).map((g,i)=>{
      if(i===gi){const has=g.invoiceIndices.includes(idx);return{...g,invoiceIndices:has?g.invoiceIndices.filter(x=>x!==idx):[...g.invoiceIndices,idx]};}
      return{...g,invoiceIndices:g.invoiceIndices.filter(x=>x!==idx)};
    });
    setG(v,gs);
  };
  const addG=v=>{
    const gs=getG(v),used=gs.flatMap(g=>g.invoiceIndices);
    const free=(grouped[v]||[]).map((_,i)=>i).filter(i=>!used.includes(i));
    setG(v,[...gs,{invoiceIndices:free,traceLink:"",note:""}]);
  };
  const removeG=(v,gi)=>{
    const gs=getG(v).filter((_,i)=>i!==gi);
    setG(v,gs.length?gs:[{invoiceIndices:(grouped[v]||[]).map((_,i)=>i),traceLink:"",note:""}]);
  };

  const handleLoad=()=>{
    const lines=pasteText.trim().split("\n").filter(l=>l.trim());
    if(lines.length<2){alert("❌ 至少需要2行（含表头）");return;}
    const rawH=lines[0].split("\t").map(h=>h.trim().replace(/\r/g,""));
    const parsed=parseCSV(pasteText);
    if(parsed.length){setRows(parsed);setLog(`✅ 表头识别：[${rawH.join(" | ")}] → ${parsed.length} 行`);}
    else{setLog(`❌ 解析失败，表头：[${rawH.join(" | ")}]`);alert("❌ 解析失败");}
  };

  const buildDrafts=()=>{
    const nd={};
    vendors.forEach(v=>{
      const invoices=grouped[v],gs=getG(v);
      nd[v]={
        to:contacts[v]?.to||[],cc:contacts[v]?.cc||[],
        subject:`Payment Notification – ${v} – ${paymentDate}`,
        body:buildHTML(v,invoices,gs,settings.senderName,settings.senderCompany,paymentDate),
        invoices,
      };
    });
    setDrafts(nd);setAD(vendors[0]);setTab("drafts");
  };

  const pushOne=async v=>{
    if(!token)return;
    const d=drafts[v];
    setPS(s=>({...s,[v]:"pushing"}));
    try{
      const res=await fetch("https://graph.microsoft.com/v1.0/me/messages",{
        method:"POST",
        headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
        body:JSON.stringify({
          subject:d.subject,importance:"Normal",
          body:{contentType:"HTML",content:d.body},
          toRecipients:d.to.map(a=>({emailAddress:{address:a}})),
          ...(d.cc?.length?{ccRecipients:d.cc.map(a=>({emailAddress:{address:a}}))}:{}),
        }),
      });
      setPS(s=>({...s,[v]:res.ok?"done":"error"}));
    }catch{setPS(s=>({...s,[v]:"error"}));}
  };

  const pushAll2=async()=>{
    setPushAll("pushing");
    for(const v of Object.keys(drafts))await pushOne(v);
    setPushAll("done");setTimeout(()=>setPushAll("idle"),3000);
  };

  const updDraft=(v,f,val)=>setDrafts(d=>({...d,[v]:{...d[v],[f]:val}}));

  const IS={width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:13};
  const card=(x={})=>({background:"#fff",borderRadius:10,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16,...x});
  const tabBtn=t=>({padding:"11px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,
    fontWeight:activeTab===t?700:400,borderBottom:activeTab===t?"3px solid #1F3864":"3px solid transparent",
    color:activeTab===t?"#1F3864":"#555"});
  const btn=(x={})=>({border:"none",borderRadius:7,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600,...x});

  return(
    <div style={{fontFamily:"Segoe UI,sans-serif",background:"#f0f4f8",minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1F3864,#2e5491)",color:"#fff",padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:26}}>📧</span>
          <div>
            <div style={{fontWeight:700,fontSize:17}}>AP Payment Email Generator</div>
            <div style={{fontSize:11,opacity:0.85}}>Outlook Draft Integration · Payment grouping · Auto-hide empty columns</div>
          </div>
        </div>
        <div>
          {authStatus==="done"
            ?<div style={{background:"rgba(255,255,255,0.15)",borderRadius:8,padding:"7px 14px",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:"#90ee90",fontWeight:700}}>✓ Connected</span>
              <span style={{opacity:0.8}}>{userEmail}</span>
            </div>
            :<button onClick={handleLogin} style={btn({background:"#fff",color:"#1F3864",boxShadow:"0 2px 6px rgba(0,0,0,0.2)"})}>
              🔑 Sign in with Microsoft
            </button>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"#fff",borderBottom:"2px solid #e2e8f0",display:"flex",padding:"0 24px",overflowX:"auto"}}>
        {[["data","📊 Data"],["contacts","👥 Contacts"],["grouping","🔗 Payment Groups"],["settings","⚙️ Settings"],
          ["drafts",`✉️ Drafts${Object.keys(drafts).length?` (${Object.keys(drafts).length})`:""}`]
        ].map(([t,label])=><button key={t} style={tabBtn(t)} onClick={()=>setTab(t)}>{label}</button>)}
      </div>

      <div style={{padding:20,maxWidth:1100,margin:"0 auto"}}>

        {/* ── DATA ── */}
        {activeTab==="data"&&<>
          <div style={card()}>
            <div style={{fontWeight:600,marginBottom:6}}>📋 Paste from Excel</div>
            <div style={{fontSize:12,color:"#888",marginBottom:8}}>
              选中付款表（含表头）→ Ctrl+C → 粘贴 → Load　|　金额列须命名为 <strong>Invoice Amount</strong>，Comment列可选
            </div>
            <textarea value={pasteText} onChange={e=>setPaste(e.target.value)} placeholder="Paste Excel data here..."
              style={{width:"100%",height:80,borderRadius:6,border:"1px solid #ddd",padding:10,fontSize:13,resize:"vertical"}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:8,flexWrap:"wrap"}}>
              <button onClick={handleLoad} style={btn({background:"#1F3864",color:"#fff"})}>Load Data</button>
              {parseLog&&<span style={{fontSize:12,padding:"4px 10px",borderRadius:6,
                color:parseLog.startsWith("✅")?"#166534":"#b45309",
                background:parseLog.startsWith("✅")?"#dcfce7":"#fff7ed"}}>{parseLog}</span>}
            </div>
          </div>

          <div style={card()}>
            <div style={{fontWeight:600,marginBottom:10}}>Current Data — {rows.length} rows · {vendors.length} vendors</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#f7f9fc"}}>
                  {["Vendor","Invoice No.","Invoice Amount","Currency","Comments"].map(h=>(
                    <th key={h} style={{padding:"8px 12px",textAlign:h==="Invoice Amount"?"right":"left",
                      borderBottom:"2px solid #e2e8f0",color:"#555",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{rows.map((r,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #f0f0f0",background:i%2?"#fafafa":"#fff"}}>
                    <td style={{padding:"7px 12px",fontWeight:600}}>{r.vendor}</td>
                    <td style={{padding:"7px 12px",fontFamily:"monospace"}}>{r.invoice}</td>
                    <td style={{padding:"7px 12px",textAlign:"right",fontFamily:"monospace"}}>
                      {r.amount||<span style={{color:"#ef4444",fontFamily:"Segoe UI"}}>⚠️ 空</span>}
                    </td>
                    <td style={{padding:"7px 12px"}}>
                      <span style={{background:"#e8edf8",color:"#1F3864",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600}}>{r.currency}</span>
                    </td>
                    <td style={{padding:"7px 12px",color:"#888",fontSize:12}}>{r.comment||"—"}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            {vendors.length>0&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px dashed #e2e8f0"}}>
              <div style={{fontWeight:600,fontSize:13,color:"#1F3864",marginBottom:8}}>📊 当日付款合计</div>
              {vendors.map(v=>{
                const t=calcTotals(grouped[v]);
                return<div key={v} style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:600,fontSize:12,minWidth:120,color:"#444"}}>{v}</span>
                  {Object.entries(t).map(([cur,amt])=>(
                    <span key={cur} style={{background:"#e8edf8",color:"#1F3864",padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:600}}>
                      {cur} {formatAmount(amt)}
                    </span>
                  ))}
                </div>;
              })}
            </div>}
          </div>
        </>}

        {/* ── CONTACTS ── */}
        {activeTab==="contacts"&&<>
          <div style={card({background:"#fffbea",border:"1px solid #f0e68c",padding:"12px 16px"})}>
            <span style={{fontSize:13,color:"#7a6200"}}>💾 联系人自动保存。输入后按 <kbd>Enter</kbd> 或 <kbd>,</kbd> 确认。</span>
          </div>
          {vendors.map(v=>(
            <div key={v} style={card()}>
              <div style={{fontWeight:700,color:"#1F3864",marginBottom:12,fontSize:14}}>🏢 {v}</div>
              <div style={{display:"grid",gap:10}}>
                <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>TO</label>
                  <TagInput value={contacts[v]?.to||[]} onChange={val=>setContacts(c=>({...c,[v]:{...c[v],to:val}}))} placeholder="to@vendor.com"/></div>
                <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>CC</label>
                  <TagInput value={contacts[v]?.cc||[]} onChange={val=>setContacts(c=>({...c,[v]:{...c[v],cc:val}}))} placeholder="cc@company.com"/></div>
              </div>
            </div>
          ))}
        </>}

        {/* ── PAYMENT GROUPS ── */}
        {activeTab==="grouping"&&<>
          <div style={card({background:"#f0f4ff",border:"1px solid #c7d2fe",padding:"12px 16px"})}>
            <div style={{fontSize:13,color:"#3730a3"}}>
              🔗 <strong>Payment Groups</strong>：将多张 invoice 分配到不同 group，每个 group 对应一个 Trace Link 和 Note，邮件中按 group 显示。<br/>
              <span style={{fontSize:12,opacity:0.8}}>Trace Link 和 Note 为空时，对应列在邮件中自动隐藏。</span>
            </div>
          </div>
          {vendors.map(v=>{
            const invoices=grouped[v],gs=getG(v);
            const assigned=invoices.map((_,i)=>gs.some(g=>g.invoiceIndices.includes(i)));
            return(
              <div key={v} style={card()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontWeight:700,color:"#1F3864",fontSize:14}}>
                    🏢 {v} <span style={{fontWeight:400,fontSize:12,color:"#888"}}>({invoices.length} invoices)</span>
                  </div>
                  <button onClick={()=>addG(v)} style={btn({background:"#e8edf8",color:"#1F3864",border:"1px solid #b0c0e0",padding:"5px 14px",fontSize:12})}>+ Add Group</button>
                </div>

                {gs.map((g,gi)=>(
                  <div key={gi} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:14,marginBottom:10,background:"#fafcff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <span style={{fontWeight:600,fontSize:13,color:"#333"}}>
                        Group {gi+1} <span style={{fontWeight:400,color:"#888",fontSize:12}}>({g.invoiceIndices.length} invoice{g.invoiceIndices.length!==1?"s":""})</span>
                      </span>
                      {gs.length>1&&<button onClick={()=>removeG(v,gi)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>}
                    </div>

                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:12,color:"#777",marginBottom:6}}>Invoices in this group:</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {invoices.map((inv,idx)=>{
                          const inThis=g.invoiceIndices.includes(idx);
                          const inOther=!inThis&&gs.some((og,ogi)=>ogi!==gi&&og.invoiceIndices.includes(idx));
                          return(
                            <button key={idx} onClick={()=>togInv(v,gi,idx)}
                              style={{padding:"5px 11px",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:inThis?700:400,
                                background:inThis?"#1F3864":inOther?"#f3f4f6":"#fff",
                                color:inThis?"#fff":inOther?"#aaa":"#444",
                                border:inThis?"1px solid #1F3864":"1px solid #ccc",
                                textDecoration:inOther?"line-through":"none"}}>
                              {inv.invoice} <span style={{opacity:0.75,fontSize:11}}>{inv.currency} {inv.amount}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <div>
                        <label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>🔗 Trace Link <span style={{color:"#aaa"}}>(空则隐藏列)</span></label>
                        <input value={g.traceLink} onChange={e=>updG(v,gi,"traceLink",e.target.value)} placeholder="https://bank.com/trace/..." style={IS}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>📝 Note <span style={{color:"#aaa"}}>(空则隐藏列)</span></label>
                        <input value={g.note} onChange={e=>updG(v,gi,"note",e.target.value)} placeholder="e.g. Wire batch 1" style={IS}/>
                      </div>
                    </div>
                  </div>
                ))}

                {assigned.some(a=>!a)&&(
                  <div style={{fontSize:12,color:"#b45309",background:"#fff7ed",borderRadius:6,padding:"6px 12px",marginTop:4}}>
                    ⚠️ 未分组：{invoices.filter((_,i)=>!assigned[i]).map(r=>r.invoice).join(", ")}
                  </div>
                )}
              </div>
            );
          })}
        </>}

        {/* ── SETTINGS ── */}
        {activeTab==="settings"&&(
          <div style={card()}>
            <div style={{fontWeight:600,marginBottom:14}}>Email Settings</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:4}}>Payment Date</label>
                <input type="date" value={paymentDate} onChange={e=>setDate(e.target.value)} style={IS}/></div>
              <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:4}}>Sender Name</label>
                <input value={settings.senderName} onChange={e=>setSettings(s=>({...s,senderName:e.target.value}))} style={IS}/></div>
              <div style={{gridColumn:"span 2"}}><label style={{fontSize:12,color:"#777",display:"block",marginBottom:4}}>Company Name</label>
                <input value={settings.senderCompany} onChange={e=>setSettings(s=>({...s,senderCompany:e.target.value}))} style={IS}/></div>
            </div>
          </div>
        )}

        {/* ── DRAFTS ── */}
        {activeTab==="drafts"&&(
          Object.keys(drafts).length===0
            ?<div style={{...card(),textAlign:"center",padding:40}}>
              <div style={{fontSize:44,marginBottom:10}}>✉️</div>
              <div style={{color:"#555"}}>No drafts yet — click Generate below</div>
            </div>
            :<div>
              <div style={card({
                background:authStatus==="done"?"#f0f4ff":"#fff8e1",
                border:`1px solid ${authStatus==="done"?"#c7d2fe":"#ffe082"}`,
                padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12
              })}>
                {authStatus==="done"
                  ?<div style={{fontSize:13,color:"#3730a3"}}>✅ Connected as <strong>{userEmail}</strong></div>
                  :<div style={{fontSize:13,color:"#7a5000"}}>⚠️ Sign in with Microsoft to push drafts to Outlook</div>}
                {authStatus==="done"&&(
                  <button onClick={pushAll2} disabled={pushAll==="pushing"}
                    style={btn({background:pushAll==="done"?"#22c55e":pushAll==="pushing"?"#aaa":"#1F3864",color:"#fff",whiteSpace:"nowrap",minWidth:220})}>
                    {pushAll==="pushing"?"⏳ Pushing...":pushAll==="done"?"✅ All saved!":`📥 Save All ${Object.keys(drafts).length} to Outlook`}
                  </button>
                )}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}>
                <div>
                  {Object.keys(drafts).map(v=>(
                    <div key={v} onClick={()=>setAD(v)} style={{padding:"10px 14px",borderRadius:8,marginBottom:6,cursor:"pointer",
                      background:activeDraft===v?"#e8edf8":"#fff",
                      border:activeDraft===v?"2px solid #1F3864":"2px solid transparent",
                      boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span style={{fontWeight:600,fontSize:13}}>{v}</span>
                        {pushStatus[v]==="done"&&<span>✅</span>}
                        {pushStatus[v]==="pushing"&&<span style={{fontSize:13}}>⏳</span>}
                        {pushStatus[v]==="error"&&<span>❌</span>}
                      </div>
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>
                        {drafts[v].invoices.length} inv · {drafts[v].to.length>0?`${drafts[v].to.length} TO`:"⚠️ no TO"}
                      </div>
                    </div>
                  ))}
                </div>

                {activeDraft&&drafts[activeDraft]&&(
                  <div style={card()}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#1F3864"}}>✉️ {activeDraft}</div>
                      {authStatus==="done"&&(
                        <button onClick={()=>pushOne(activeDraft)} disabled={pushStatus[activeDraft]==="pushing"}
                          style={btn({background:pushStatus[activeDraft]==="done"?"#22c55e":pushStatus[activeDraft]==="pushing"?"#aaa":"#1F3864",color:"#fff"})}>
                          {pushStatus[activeDraft]==="pushing"?"⏳ Saving...":pushStatus[activeDraft]==="done"?"✅ Saved!":pushStatus[activeDraft]==="error"?"❌ Retry":"📥 Save to Outlook"}
                        </button>
                      )}
                    </div>
                    <div style={{display:"grid",gap:10,marginBottom:14}}>
                      <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>TO</label>
                        <TagInput value={drafts[activeDraft].to} onChange={v=>updDraft(activeDraft,"to",v)} placeholder="recipient@vendor.com"/></div>
                      <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>CC</label>
                        <TagInput value={drafts[activeDraft].cc||[]} onChange={v=>updDraft(activeDraft,"cc",v)} placeholder="cc@company.com"/></div>
                      <div><label style={{fontSize:12,color:"#777",display:"block",marginBottom:3}}>SUBJECT</label>
                        <input value={drafts[activeDraft].subject} onChange={e=>updDraft(activeDraft,"subject",e.target.value)} style={IS}/></div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:12,color:"#777",fontWeight:600}}>EMAIL PREVIEW</span>
                      <button onClick={()=>setEB(e=>({...e,[activeDraft]:!e[activeDraft]}))}
                        style={{fontSize:11,background:"none",border:"1px solid #ddd",borderRadius:4,padding:"3px 10px",cursor:"pointer",color:"#555"}}>
                        {editingBody[activeDraft]?"👁 Preview":"✏️ Edit HTML"}
                      </button>
                    </div>
                    {editingBody[activeDraft]
                      ?<textarea value={drafts[activeDraft].body} onChange={e=>updDraft(activeDraft,"body",e.target.value)}
                          style={{width:"100%",height:400,borderRadius:6,border:"1px solid #ddd",padding:10,fontSize:12,fontFamily:"monospace",resize:"vertical"}}/>
                      :<div style={{border:"1px solid #e8e8e8",borderRadius:8,padding:24,background:"#fff",minHeight:280,overflowX:"auto"}}
                          dangerouslySetInnerHTML={{__html:drafts[activeDraft].body}}/>
                    }
                  </div>
                )}
              </div>
            </div>
        )}

        {activeTab!=="drafts"&&(
          <div style={{marginTop:16,textAlign:"center"}}>
            <button onClick={buildDrafts} disabled={rows.length===0}
              style={btn({background:"linear-gradient(135deg,#1F3864,#2e5491)",color:"#fff",padding:"13px 36px",fontSize:15,boxShadow:"0 4px 14px rgba(31,56,100,0.35)",opacity:rows.length===0?0.5:1})}>
              ✨ Generate {vendors.length} Draft Email{vendors.length!==1?"s":""}
            </button>
            <div style={{fontSize:11,color:"#999",marginTop:6}}>
              Arial 11pt · Invoice Amount → Currency · Notes & Trace auto-hide when empty · Total row per vendor
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
